<!DOCTYPE html>
<html lang="en">
<head>
  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Roboto+Serif:opsz,wght@8..144,700&family=Rubik&display=swap" rel="stylesheet">
<!--  -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>calculadora</title>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="last-calc">1+1</div>
      <div class="result">
        <div>
         <img src="assets/frame.png" alt="" style="width: 20px;">
        </div>
        <span>25</span>
      </div>
    </div>
    <div class="key-board">
      <button class="second">CE</button>
      <button>C</button>
      <button>%</button>
      <button class="third"><img src="assets/FontAwesome-Divide-icon.png" alt="" style="width: 30px;"></button>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="third">X</button>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="third">-</button>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="third">+</button>
      <button></button>
      <button>0</button>
      <button>,</button>
      <button class="fourth">=</button>
    </div>
  </div>
</body>
</html>
